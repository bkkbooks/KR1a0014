body:
  text: 橫渠易説目録易類卷一上經卷二下經卷三繫辭上繫辭下説卦序卦雜卦臣等謹案橫渠易説三卷宋張載撰上經一卷下經一卷繫辭傳以下至雜卦為一卷末有總論十一則是書較之程傳尤簡往往經文數十句中一無所説卷內遂不復全載經文載其有説者而已蓋儒者之言必真有得而記之不以多寡計也其説乾彖用迎之不見其首隨之不見其後語説文言用谷神語説鼓萬物而不與聖人同憂用天地不仁以萬物為芻狗語皆借老子之言而實異其義非如魏晉人合老易為一者也惟其解后不省方為繼體守成之主富庶優暇不甚省事則於義似乎未安此又不得以載之故而曲為之詞已乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b4f99b285c2b6884183a58e6cb7220fd33a3f1593e444c60bbce887108c0fae5
