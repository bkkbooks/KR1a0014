body:
  text: 横渠易說目録易類卷一上經卷二下經卷三繫辭上繫辭下說卦序卦雜卦臣等謹案横渠易說三卷宋張載撰上經一卷下經一卷繫辭𫝊以下至雜卦為一卷末有總論十一則是書較之程𫝊尤簡往往經文數十句中一無所說卷内遂不復全載經文載其有說者而已蓋儒者之言必真有得而記之不以多寡計也其說乾彖用迎之不見其首隨之不見其後語說文言用谷神語說鼔萬物而不與聖人同憂用天地不仁以萬物為芻狗語皆借老子之言而實異其義非如魏晉人合老易為一者也惟其解后不省方為繼體守成之主富庶優暇不甚省事則於義似乎未安此又不得以載之故而曲為之詞已乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6f43979f75cd192d7104833b00c6c3fc76c357cd5121ba64d85fdae83988c4c9
