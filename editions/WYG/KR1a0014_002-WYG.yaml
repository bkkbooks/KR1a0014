body:
  text: 横渠易説卷二宋張載撰下經咸咸亨利貞取女吉咸之為道以虚受為本有意於中則滯於方體而隘矣拇腓股脢輔以一卦通體髙下為言彖曰咸感也柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣咸感也其爻雖相應而詞多不吉顧其時如何耳説者多以咸恒配天地殊不知咸自可配天地故於序卦獨不言咸咸既可以配天地則恒亦可以配天地皆夫婦之道也咸之為言皆也故語咸則非事咸感也不可止以夫婦之道謂之咸此一事耳男女相配故為咸也感之道不一或以同而感聖人感人心以道此是以同也或以異而應男女是也二女同居則无感也或以相恱而感或以相畏而感如虎先見犬犬自不能去犬若見虎則能避之又如磁石引針相應而感也若以愛心而来者自相親以害心而来者相見容色自别聖人感人心而天下和平是風動之也聖人老吾老以及人之老而人欲老其老此是以事相感也感如影響无復先後有動必感咸感而應故曰咸速也象曰山上有澤咸君子以虚受人山上有澤非交感不能也感物之善莫若以虚受人有所係慕皆非正吉故六爻皆以有應不盡卦義而有所譏也初六咸其拇象曰咸其拇志在外也六二咸其腓凶居吉象曰雖凶居吉順不害也居則吉趨則凶以男下女為正咸之道也九三咸其股執其随往吝象曰咸其股亦不處也志在随人所執下也心寜静於此一向定疊前縱有何事亦不恤也休將閑細碎在思慮易曰何思何慮天下殊塗而同歸一致而百慮天地之道惟有日月寒暑之往来屈伸動静兩端而已在我精義入神以致用則細碎皆不能出其閒在於術内已過未来者事著在心畢竟何益浮思游想盡去之惟圖向去日新可也孔子以富不可求則曰從吾所好以思為无益則曰不如學也故於咸三以見此義九四貞吉悔亡憧憧往来朋從爾思象曰貞吉悔亡未感害也憧憧往来未光大也釋氏以感為幻妄又有憧憧思以求朋者皆不足道也以陽居隂非躁感於物者也然體兊性恱未免乎思以求朋之累也盖體恱之初應止之始已勞於上朋止於下故憧憧得朋未為光大不持以正則有諂瀆之悔感非有意咸三思以求朋此則不足道聖人惟於屈伸有感能有屈伸所以得天下之物何用憧憧以思而求朋大抵咸卦六爻皆以有應不盡咸道故君子欲得虚受人能容以虚受人之道也苟曉屈伸心儘安泰寛裕盖為不與物挍待彼伸則已屈然而屈時少伸時多假使亂亡横逆亦猶屈少伸多我尚何傷日月寒暑往来正以相屈伸故不相害尺蠖之屈以求伸龍蛇之蟄以存身又精義入神以致用利用安身以崇徳九五咸其脢无悔象曰咸其脢志末也九五處恱之中未免偏係之弊故不能感人心而曰咸其脢惟聖人然後能感人心也一无曰字上六咸其輔頰舌象曰咸其輔頰舌滕口説也恒恒亨无咎利貞利有攸往彖曰恒久也剛上而柔下雷風相與巽而動剛柔皆應恒恒亨无咎利貞久於其道也天地之道恒久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恒而天地萬物之情可見矣象曰雷風恒君子以立不易方觀書當不以文害辭如云義者出於思慮忖度易言天地之大義則天地固無思慮天地之情天地之心皆放此初六浚恒貞凶无攸利象曰浚恒之凶始求深也柔巽在下以應於上持用為常求之過深也故人道之交貴乎中禮且久漸而成也持一作特九二悔亡象曰九二悔亡能久中也以陽係隂用以為常不能无悔以其久中故免九三不恒其徳或承之羞貞吝象曰不恒其徳无所容也進則犯上退則乗剛故動則招悔取辱惟常守一徳庶㡬取容故曰不恒其徳則无所容也一作雖然貞吝徳則可常也九四田无禽象曰久非其位安得禽也田以時至則禽或可得處常非位則功无以致故君子降志辱身不可常也六五恒其徳貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也上六振恒凶象曰振恒在上大无功也卦例於上爻多處之以貴而无位髙而无民至恒又不可以此處但見其不常在上故大无功也易道灼然義理分明自存乎卦惟要人玩之乃得遯遯亨小利貞彖曰遯亨遯而亨也剛當位而應與時行也小利貞浸而長也遯之時義大矣哉當位而應理不當遯以隂長故遯故曰與時行又曰小利貞又曰遯而亨也象曰天下有山遯君子以逺小人不惡而嚴逺小人不惡而嚴惡讀為憎惡之惡逺小人不可示此惡也惡則患及之又焉能逺嚴之為言敬小人而逺之之義也初六遯尾厲勿用有攸往象曰遯尾之厲不往何災也危而不往何也遯既後時往則取災故知者違難在乎先㡬六二執之用黄牛之革莫之勝説象曰執用黄牛固志也黄牛中順也隂邪浸長二居君臣正合之位戡難救時莫若中順固志使姦不能干不然小人易閒矣九三係遯有疾厲畜臣妾吉象曰係遯之厲有疾憊也畜臣妾吉不可大事也為内之主得位之正立愛其下畜臣妾之道盡矣然以斯處遯危疾宜焉九四好遯君子吉小人否象曰君子好遯小人否也有應於隂不惡而嚴故曰好遯小人暗於事㡬不忿怒成仇則私溺為慮矣九五嘉遯貞吉象曰嘉遯貞吉以正志也嘉好義同然五居正處中能正其志故獲貞吉上九肥遯无不利象曰肥遯无不利无所疑也大壯大壯利貞彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣象曰雷在天上大壯君子以非禮弗履克已反禮壯莫甚焉故易於大壯見之克已下學上逹交相養也下學則必逹逹則必上盖不行則終何以成徳明則誠矣誠則明矣克已要當以理義戰退私己盖理乃天徳克已者必有剛强壯健之徳乃勝已雷在天上大壯君子以非禮弗履夫酒清人渇而不敢飲肴乾人飢而不敢食非强有力者不能人所不能人所以不能行己者於其所難者則惰其異俗者雖易而羞縮惟心𢎞則不顧人之非笑所趨義理耳視天下莫能移其道然為之人亦未必怪正以在己者義理不勝惰與羞縮之病消則有長不消則病常在消盡則是大而化之之謂聖意思齷齪无由作事在古氣節之士冐死以有為於義未必中然非有志槩者莫能況吾於義理已明何為不為正以不剛惟大壯乃能克已盖君子欲身行之為事業以教天下今夫為長者折枝非不能也但恥以為屈而不為耳不顧義理之若何初九壯于趾征凶有孚象曰壯于趾其孚窮也九二貞吉象曰九二貞吉以中也九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也以陽居陽正也然乗下之剛故危小人用此而進如羝羊觸藩以為壯故多見困君子知㡬則否藩以喻四三有應所之在進而位正理直小人處之必以剛動九四貞吉悔亡藩決不羸壯于大輿之輹象曰藩決不羸尚往也乗剛本有悔不用其壯故貞吉三以四為藩九四上无陽爻故曰藩決壯輿之輹往无咎也四能不為隂累守己以正則吉而无乗剛之悔且得衆陽之助以銷隂慝六五喪羊于易无悔象曰喪羊于易位不當也羊外柔而内很六五以隂處陽羊喪之象也能去其内剛不拒来者則无悔故曰喪羊于易无悔履柔危之地乗壯動之剛固之必悔者位非其所堪也上六羝羊觸藩不能退不能遂无攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也剛競用觸則進退皆凶危懼求全則咎有時而息也然上六以隂居上不詳事宜用壯而觸故進退不能晉晉康侯用錫馬蕃庶晝日三接彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也象曰明出地上晉君子以自昭明徳初六晉如摧如貞吉罔孚裕无咎象曰晉如摧如獨行正也裕无咎未受命也居晉之初正必見摧故摧如不害於貞吉也未孚於人或未見聽寛以居之乃无咎然初六有應在四居下援上未安其分故曰未受命也六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也進而无撓多失於肆故愁如乃吉六五以隂居尊故稱王母俱以柔中故受福可必也六三衆允悔亡象曰衆允之志上行也上歴九四不為衆信則取悔可必若志應在上晉為衆允則悔亡九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也鼫鼠為物貪而畏人體陽在進反據隂位故動止皆失與六三之義為相反矣六五悔亡失得勿恤往吉无不利象曰失得勿恤往有慶也進而遇陽故失得不恤而吉也位不當必有悔獲吉則悔亡上九晉其角維用伐邑厲吉无咎貞吝象曰維用伐邑道未光也窮无所往故曰角居明之極其施未光而應尚狹持此以進伐邑討叛而已危而幸吉以得无咎然終吝道也无可進而進不已惟伐邑於内而可矣如君子則知止也明夷明夷利艱貞彖曰明入地中明夷内文明而外柔順以蒙大難文王以之利艱貞晦其明也内難而能正其志箕子以之文王體一卦之用箕子以六五一爻之徳文王難在外箕子難在内也象曰明入地中明夷君子以莅衆用晦而明不任察而不失其治也初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也進應於上為三所困故曰于飛垂翼君子避患當速勢不與抗退而逺行不遑暇食静以自守非有所往之時也六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也與三同體三為六應故曰夷于左股居中履順難不能及故曰用拯馬壯吉馬謂初九亦為己用故欲拯闇同九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也九三進獲明夷之主故曰南狩得其大首六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也與上六同為一體故曰入于左腹與五親比故曰出門獲明夷之心盖用柔履中其志相得故曰獲心意也六五箕子之明夷利貞象曰箕子之貞明不可息也雖近於闇然柔順履中闇不能掩箕子之正也上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也家人家人利女貞彖曰家人女正位乎内男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣象曰風自火出家人君子以言有物而行有恒家道之始始諸飲食烹飪故曰風自火出家人道在於烹㸑一家之政樂不樂平不平皆繫乎此初九閑有家悔亡象曰閑有家志未變也男處女下悔也六二无攸遂在中饋貞吉象曰六二之吉順以巽也九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也位為過中則履非得宜與其慢也寜嚴六四富家大吉象曰富家大吉順在位也柔順在位故能長保其富九五王假有家勿恤吉象曰王假有家交相愛也有應在二得男女内外家道大正足以化成天下故王假之上九有孚威如終吉象曰威如之吉反身之謂也以陽居尊故威如身修而家齊故終吉睽睽小事吉彖曰睽火動而上澤動而下二女同居其志不同行説而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉象曰上火下澤睽君子以同而異一於異則乖而不合故和而不同初九悔亡喪馬勿逐自復見惡人无咎象曰見惡人以辟咎也履睽之始悔也能以貴下賤故悔亡馬復屈下惡人能免於咎九二遇主于巷无咎象曰遇主于巷未失道也守正居中故能求主於乖喪之際不失其道乖睽主有不可顯遇之時六三見輿曳其牛掣其人天且劓无初有終象曰見輿曳位不當也无初有終遇剛也乗剛遇敵輿衞皆困九四睽孤遇元夫交孚厲无咎象曰交孚无咎志行也六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也二能勝三如噬膚耳何間已往上九睽孤見豕負塗載鬼一車先張之弧後說之弧匪冦㛰媾往遇雨則吉象曰遇雨之吉羣疑亡也蹇蹇利西南不利東北利見大人貞吉蹇之世大人乃能成功彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉象曰山上有水蹇君子以反身脩徳見險能止然不可終止而已當見大人之徳進之坤順致養之地則得其中若更退守艮止則難无時而觧也故曰不利東北其道窮也至于解卦則曰其来復吉乃得中也與此互見矣盖難在内外與震之動止則相反爾初六往蹇来譽象曰往蹇来譽宜待也蹇難之際用心存公无所偏係故譽美可獲六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終无尤也九三往蹇来反象曰往蹇来反内喜之也六四往蹇来連象曰往蹇来連當位實也連順也序也蹇反當位正吉六四未能出險故可止而順序以俟難之觧當位處隂之實九五大蹇朋来象曰大蹇朋来以中節也剛中之徳為物所歸上六往蹇来碩吉利見大人象曰往蹇来碩志在内也利見大人以從貴也與觧繇同義解解利西南无所往其来復吉有攸往夙吉彖曰觧險以動動而免乎險解解利西南往得衆也其来復吉乃得中也有攸往夙吉往有功也天地觧而雷雨作雷雨作而百果草木皆甲拆觧之時大矣哉象曰雷雨作解君子以赦過宥罪難免人患散則得衆者吉往而不返則生他變有所往而不速將后于時也故无所往則静吉有所往則速吉初六无咎象曰剛柔之際義无咎也險難方解未獲所安近比於二非其咎也九二田獲三狐得黄矢貞吉象曰九二貞吉得中道也險亂方觧不正自疑之隂皆自歸附而順聽也故曰田獲三狐不以三狐自累上合于五則得黄矢之象也六三負且乗致寇至貞吝象曰負且乗亦可醜也自我致戎又誰咎也不正而近比二剛不能致一故有小人負乗之象貪以致宼也九四解而拇朋至斯孚象曰解而拇未當位也位不當則所履者邪故失位之隂因得駢附險亂即觧觧之則朋信當一作正六五君子惟有觧吉有孚于小人象曰君子有觧小人退也君子道亨則邪類之退必矣上六公用射隼于髙墉之上獲之无不利象曰公用射隼以觧悖也忘義而貪故以喻隼損損有孚元吉无咎可貞利有攸往曷之用二簋可用享彖曰損損下益上其道上行損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行象曰山下有澤損君子以懲忿窒欲損下益上損剛益柔非可常行必有孚元吉无咎可貞然後利有所進故下云有時初九已事遄往无咎酌損之象曰已事遄往尚合志也損剛益柔有時損不可過抑而居下有為而然故事已則當速反於上與四合志損不以中未免於咎也九二利貞征凶弗損益之象曰九二利貞中以為志也以陽居隂剛徳已損故以征則凶能志於正則雖損非損其實受益六三三人行則損一人一人行則得其友象曰一人行三則疑也六三本為上六與坤同體若連茹彚征三人並行則反非益上之道也六四損其疾使遄有喜无咎象曰損其疾亦可喜也六三志應於上近不相得不固其躓使速應於上則初九之應无所閒阻故曰損其疾使彼有喜故已亦可喜而无咎也六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也龜弗克違言受益之可必信然不疑也或益之上九自外来而比之況其下者乎上九弗損益之无咎貞吉利有攸往得臣无家象曰弗損益之大得志也上九本為九三雖為損下其實上行故云弗損益之損終反益反如益卦損上而益下則可大得志至于得臣无家言所有之多也以剛在上受下之益多矣故无所施損當反益於下故曰弗損益之益益利有攸往利渉大川彖曰益損上益下民說无疆自上下下其道大光利有攸往中正有慶利渉大川木道乃行益動而巽日進无疆天施地生其益无方凡益之道與時偕行象曰風雷益君子以見善則遷有過則改上巽下動者損上益下之道木以動而巽故利渉大川否卦九四下而為初九故曰天施地生又曰損上益下又曰自上下下初九利用為大作元吉无咎象曰元吉无咎下不厚事也以剛陽之徳施益於下故利用大作然必元吉乃无咎也六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外来也或益之十朋之龜弗克違言損上益下之道理不可易人皆信之雖十朋之龜亦不能違此道也往見損九五居中體柔蒙上之益修報於下享帝之美莫盛此焉或益之必有自外来而益之者也六三益之用凶事无咎有孚中行告公用圭象曰益用凶事固有之也中行者不私於應无所偏係也用心不私以拯凶難雖非王者之佐可以用之牧伯以為藩屏之臣矣體躁居陽上有剛應持此施益用拯凶難乃其固能也故无咎可必然亦湏執禮告上公而行方合中道其曰告公者未足專進為王者之佐也六四中行告公從利用為依遷國象曰告公從以益志也以隂居隂體巽應卑持此施益可以為依遷之國純用卑柔仍告上公見從方可用事无剛故也不足告王故曰告公本為初六寄位於四居隂體巽所趨在下以為依遷之國人所容信然必中行不私然後可告必見從盖上以益下為心也九五有孚恵心勿問元吉有孚恵我徳象曰有孚恵心勿問之矣恵我徳大得志也上九莫益之或擊之立心勿恒凶象曰莫益之偏辭也或擊之自外来也體剛質巽志應在下位亢於上故立心勿恒或擊之反或益之之義為文故又云自外来也未嘗損己而云莫益之作易者因益卦而言爾夬夬揚于王庭孚號有厲告自邑不利即戎利有攸往益而不已必決故受之以夬彖曰夬決也剛決柔也健而說決而和揚于王庭柔乗五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也不可以必勝而忽慢故能矜慎則愈光也除惡務本故利有所進而後為徳乃終象曰澤上於天夬君子以施禄及下居徳則忌君子道長故非徳之禁可以必行然不可恃令之行无恩以及下也初九壯于前趾往不勝為咎象曰不勝而往咎也言能慮勝而往則无咎九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也警懼申號能孚號而有厲也以必勝之剛決至危之柔能自危慮雖有戎何恤能得中道故剛而不暴九三壯于頄有凶君子夬夬獨行遇雨若濡有愠无咎象曰君子夬夬終无咎也九三以陽居陽進夬於上是壯于頄也不得中道過壯或凶故曰有凶君子明於事㡬能夬於用夬進而緩之以善其終不假用衆故曰獨行使之恱從故曰遇雨若濡君子之心終无係累故必有愠雖其有愠於正无害故曰无咎故君子之道綽然餘裕終不為咎也九四臀无膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也一隂在上衆陽争趨三其正應已獨乗之故行止皆凶牽羊者必讓而先之則為力也易溺於所趨必不能用故曰聞言不信溺於心者聽必不聰九五莧陸夬夬中行无咎象曰中行无咎中未光也陽近於隂不能无累故必正其行然後免咎上六无號終有凶象曰无號之凶終不可長也姤姤女壯勿用取女彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉非中爻不能備卦徳故曰剛遇中正象曰天下有風姤后以施命誥四方上所以用柔於下者誥令莫大焉初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也金柅二物也處姤之時不牽於近則所往皆凶孚信也豕方羸時力未能動然至誠在於蹢躅得申則申矣如李徳裕處置閹宦徒知其帖息威伏而忽於志不忘逞照察少不至則失其㡬也九二包有魚无咎不利賔象曰包有魚義不及賔也九三臀无膚其行次且厲无大咎象曰其行次且行未牽也行而无所與遇故曰行未牽也進退无所係也九四包无魚起凶象曰无魚之凶逺民也九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也杞之為物根固於下瓜之為實潰必自内九五以中正剛健含章宅尊而遇隂柔浸長之時厚下安宅潰亂是防盡其人謀而聽天命者也以杞包瓜文王事紂之道厚下以防中潰盡人謀而聽天命者歟上九姤其角吝无咎象曰姤其角上窮吝也窮不知變吝之道也萃萃亨王假有廟利見大人亨利貞用大牲吉利有攸往姤者遇也物相遇而後聚故受之以萃與渙卦義同故繇詞互見萃而不見大人之徳吝道也彖曰萃聚也順以說剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣象曰澤上於地萃君子以除戎器戒不虞聚而致享必有廟乃盡其實聚而不見大人之徳吝道也聚不以正私邪勝也富聚之世順天之命用大牲有所進為宜散而通之順天命而不凝於物也凝一作疑初六有孚不終乃亂乃萃若號一握為笑勿恤往无咎象曰乃亂乃萃其志亂也萃聚之世物各以近相求所處逺者雖有其應不能專一初六履不以中萃而志亂故為衆輕侮若能啼號齎咨專一其守不恤衆侮則往而无咎六二引吉无咎孚乃利用禴象曰引吉无咎中未變也物思其聚之時能自持不變引而後往吉乃无咎凡言利用禴皆誠素著白於幽明之際未孚而略禮則神怒而民怨六三萃如嗟如无攸利往无咎小吝象曰往无咎上巽也九四大吉无咎象曰大吉无咎位不當也位非極顯而有物之萃非大吉則悔吝必矣九五萃有位无咎匪孚元永貞悔亡象曰萃有位志未光也居得盛位不能見以大人之徳係應於二故曰有位履非不正故无咎然非君人之大信為徳非厚不能无悔故元永貞而後悔亡上六齎咨涕洟无咎象曰齎咨涕洟未安上也以隂居上極物之萃非所堪也升升元亨用見大人勿恤南征吉彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也象曰地中生木升君子以順徳積小以髙大萃者聚也聚而上者謂之升故受之以升乾之九二利見大人而以時之上升之九二有六五配合之慶故可見大人之徳南征而勿恤也初六允升大吉象曰允升大吉上合志也允信也自信於已與上合志而升九二孚乃利用禴无咎象曰九二之孚有喜也與萃六二同九三升虚邑象曰升虚邑无所疑也上皆隂柔往无所疑六四王用亨于岐山吉无咎象曰王用亨于岐山順事也六五貞吉升階象曰貞吉升階大得志也柔中極尊不拒来者使物皆階已而升正而且吉志宜大獲也易所謂得志者聖賢獲其願欲得臣无家堯之志也貞吉升階舜之志也上六冥升利于不息之貞象曰冥升在上消不富也困困亨貞大人吉无咎有言不信彖曰困剛揜也險以說困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也象曰澤无水困君子以致命遂志升而不已必困故受之以困困于險下柔不自振非窮而能亨致命遂志者也初六臀困于株木入于幽谷三嵗不覿象曰入于幽谷幽不明也處困者正乃无咎居非得中故幽而不明九二困于酒食朱紱方来利用享祀征凶无咎象曰困于酒食中有慶也困危之際物思所附九二以剛居中正大人之吉上下交說不施聰明美物方至然未可有為故以祭則吉以征則凶雖或凶於義无咎際一作世六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乗剛也入于其宫不見其妻不祥也九四来徐徐困于金車吝有終象曰来徐徐志在下也雖不當位有與也心有偏係吝也以陽履柔故有終九五劓刖困于赤紱乃徐有說利用祭祀象曰劓刖志未得也乃徐有說以中直也利用祭祀受福也以陽居陽處困以剛威怒以求物之来是反為赤紱所困者也與九二之義反矣苟能徐以俟之乃心有說故曰乃徐有說物既自至以事鬼神然後福可致焉處困用中可以不失其守而已故言利用祭祀然非有為之時也上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也處困之極重剛在下不得其肆居非所安舉則招悔取捨皆咎故行然後吉一云動悔有悔猶云動悔之悔也井井改邑不改井无喪无得往来井井汔至亦未繘井羸其瓶凶彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也象曰木上有水井君子以勞民勸相養而不窮莫若勞民而勸相也初六井泥不食舊井无禽象曰井泥不食下也舊井无禽時舍也九二井谷射鮒甕敝漏象曰井谷射鮒无與也九三井渫不食為我心惻可用汲王明並受其福象曰井渫不食行惻也求王明受福也井以既出為功井道之成在於上六三其正應而又以陽居陽充滿可汲為五所閒功不上施故為我心惻然若上六明於照物則上下逺邇皆獲其利井渫不食强施行惻然且不售作易者之歎歟六四井甃无咎象曰井甃无咎脩井也无應於上无敝漏於下故但免咎而已九五井洌寒泉食象曰寒泉之食中正也井洌寒泉美而可汲者也剛中之徳為衆所利上六井收勿幕有孚元吉象曰元吉在上大成也革革已日乃孚元亨利貞悔亡彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以說大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉象曰澤中有火革君子以治歴明時初九鞏用黄牛之革象曰鞏用黄牛不可以有為也賤而无應非大亨以正之徳中堅自守不可有為六二已日乃革之征吉无咎象曰已日革之行有嘉也俟上之唱革而往應柔中之徳所之乃吉九三征凶貞厲革言三就有孚象曰革言三就又何之矣以文明炎上剛陽之徳進而之兊兊内柔外剛勢窮必反故以征則凶能守正戒懼文命告之此三革言彼三從命必然可信之理也一云征則雖正而危九四悔亡有孚改命吉象曰改命之吉信志也約已居隂心无私係革而必當見孚於衆改命唱始信已可行故吉九五大人虎變未占有孚象曰大人虎變其文炳也以剛居尊說而唱下為衆所覩其文炳然不卜而孚望而可信下觀而化革著盛焉大人虎變夫何疚之有上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也以柔為徳不及九五剛中炳明故但文章蔚縟能使小人改觀而從也盛徳之容顔孟以上始可以觀若顔子變則必大變即大人虎變虎變則其文至也如此則不待占而有信君子所至之分以致文則足以為班班之縟革面而聽命已不敢犯此所謂盡飾之道斯行者逺矣然猶是就小成上以致其文顔子地位於豹變已為褻就未必肯於此發見此所以如愚愚雖是於吾言无所不說然必夫子省其私始知不愚察其人焉惟是徇内尚質爾然發則不小發大扺止乃有光明艮曰時止則止時行則行其道光明形則著著則明必能止則有光明今作事特未决盖非止也止乃决為然後就其上文章顔子見其進未見其止未止故未發見其所止又必欲如所期盖未見夫子着心處故未肯止是之謂隐而未見行而未成是以勿用學者至此地位亦必如愚然顔子學舉措亦无不致文中節處自是謂博我以文則文豈不足但顔子不以為意所謂有若无實若虚也有顔子之心則不為顔子之文可也鼎鼎元吉亨彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨象曰木上有火鼎君子以正位凝命正始而取新莫先於正位而定命也初六鼎顛趾利出否得妾以其子无咎象曰鼎顛趾未悖也利出否以從貴也柔牽於上必有義乃可鼎顛趾必出否妾從子貴必以有子乃不悖於義也九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終无尤也以陽居中故有實實而與物競則所喪多矣故所之不可不慎也我仇謂三也三為革為塞固已路而為患者也使其有疾而不能加我則美實可保而吉可致也然四亦惡三三常懼焉是有疾而无尤也九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也耳革行塞處二陽之間上下俱實也上下革塞則雖有美實而不見取若二使應五四使應初則其悔可虧故曰方雨虧悔能終不固塞其路則吉可召也革塞之則失其義矣以陽居陽承乗皆剛悔也有九四之革其行不得上通此鼎耳之失義也九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也六五鼎黄耳金鉉利貞象曰鼎黄耳中以為實也居中故其耳黄體柔故其鉉金柔故利於貞一作利於勁正上九鼎玉鉉大吉无不利象曰玉鉉在上剛柔節也以剛居上能貞潔如玉以成鼎道不牽隂柔以固其節則吉无不利鼎象也足隂腹陽耳虚鉉剛故曰剛柔節也震震亨震来虩虩笑言啞啞震驚百里不喪匕鬯彖曰震亨震来虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也象曰洊雷震君子以恐懼修省此卦純以君出子在而言則震之體全而用顯故曰出可以守宗廟社稷不雜言君父共國之時也初九震来虩虩後笑言啞啞吉象曰震来虩虩恐致福也笑言啞啞後有則也六二震来厲億喪貝躋于九陵勿逐七日得象曰震来厲乗剛也初動而之上故曰躋于九陵億必也六三震蘇蘇震行无眚象曰震蘇蘇位不當也蘇蘇亦索索之義處非其地故危困不一能懼而改行則无眚矣九四震遂泥象曰震遂泥未光也處衆隂之中為衆附比剛陽之徳而以位隂故泥而未光也六五震往来厲億无喪有事象曰震往来厲危行也其事在中大无喪也懼往亦厲懼来亦厲能行已以危則富貴可保故曰无喪有事猶云不失其所有也以其乗剛故危以其在中故无喪禍至與不至皆懼則无喪有事一云懼隂之中上六震索索視矍矍征凶震不于其躬于其隣无咎㛰媾有言象曰震索索中未得也雖凶无咎畏鄰戒也危以動懼以語无交而求則民弗與也故以征則凶能以鄰危懼則可免咎鄰謂五也五既附四已或與焉則招悔而有言矣能以鄰為戒不待及身而戒則无咎艮艮其背不獲其身行其庭不見其人无咎雖處喧閧亦无害於為學有人於此或日月而至焉亦有終日而不至者及其久也去者常少若居於家聞嬰孩之啼則有不忍之心聞奴婢喧戾則猶有不容之意至於市井紛囂一不與我事何傷於存誠養志易曰艮其背不獲其身行其庭不見其人无咎夫入他人之庭不見其人可止也艮其背至近於人也然且不見以其上下无應也時止則止時行則行動静不失其時其道光明學者必時其動静則其道乃不蔽昧而明白今人從學之久不見進長正以莫識動静見他人擾擾非闗已事而所修亦廢由聖學觀之冥冥悠悠以是終身謂之光明可乎彖曰艮止也時止則止時行則行動静不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人无咎也易言光明者多艮之象著則明之義也象曰兼山艮君子以思不出其位位所安之分也如素夷狄行乎夷狄素患難行乎患難初六艮其趾无咎利永貞象曰艮其趾未失正也六二艮其腓不拯其随其心不快象曰不拯其随未退聽也腓體之随也不能禁其趾而徒止其腓腓所未聽故心不能快九三艮其限列其夤厲薫心象曰艮其限危薫心也一身而動止中列危至薰心六四艮其身无咎象曰艮其身止諸躬也止於心故能艮其身咸之九四朋從爾思義近之六五艮其輔言有序悔亡象曰艮其輔以中正也不能施止於心而能止其言故悔可亡也上九敦艮吉象曰敦艮之吉以厚終也漸漸女歸吉利貞彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也漸者天地之施交女歸吉進得位皆指六四施一作始象曰山上有木漸君子以居賢徳善俗居可久之徳難從无徴之徳君子不以責人君子以賢徳自居不强率人待其心回故善俗自然一作不可推行无徴難從之徳初六鴻漸于干小子厲有言无咎象曰小人之厲義无咎也鴻為水鳥漸進之始出至于干鴻鵠之志非小子所量見其出陸爭欲危之且疑其所處非君子信已而行義无咎也六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也衎衎和樂貎飲食和樂不徒飽而已言獲志之多也九三鴻漸于陸夫征不復婦孕不育凶利禦宼象曰夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也漸卦九三六四易位而居三離上卦四離下體故曰夫征不復婦孕不育然相與之固物莫能閒故利用禦寇也征不復者變為艮且得位也如六四之得桷三四非正合故曰失其道也六四鴻漸于木或得其桷无咎象曰或得其桷順以巽也木非鴻所居如四之易位而在上也然本坤之爻進而為巽故或得其桷居之可安也順巽則衆所與也故得所安九五鴻漸于陵婦三嵗不孕終莫之勝吉象曰終莫之勝吉得所願也上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也无應於下羽潔无汙且處於髙故曰漸陸歸妹歸妹征凶无攸利彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也說以動所歸妹也征凶位不當也无攸利柔乗剛也泰之九三進而在四六四降而在三故曰天地之大義也然泰道將終征將為否故曰凶三五皆乗剛必退反乃吉歸妹與革均是澤為大卦義不相干故革具四徳而歸妹初不言徳也妹者是少女之稱也對長男而言之故言少女先儒為姪娣之義於卦不見於爻辭則有君與娣之稱長男而與長女是人之常也少女而與少男是人之感也說以動湏是歸妹聖人直是盡人情象曰澤上有雷歸妹君子以永終知敝永常禮之終知人情之敝初九歸妹以娣跛能履征吉象曰歸妹以娣以恒也跛能履吉相承也陽處於上不可不随故征吉以兊應震合卦之義常道也爻為陽故能履非匹故跛九二眇能視利幽人之貞象曰利幽人之貞未變常也震動乎上雖匹而不至所以眇陽中故能視不援上幽人之貞也六三歸妹以須反歸以娣象曰歸妹以須未當也三隂本彚征在上今六三反下而為兊故曰歸妹以須反歸以娣女當待年于家令待年夫家而反歸故曰未當九四歸妹愆期遲歸有時象曰愆期之志有待而行也九四當速交而為泰今獨後者三有所待也故曰愆期六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也歸妹交泰之事備矣與泰六五同又於此見為之戒也以其貴行故戒其滿以幾望一作又於此見新故之戒也上六女承筐无實士刲羊无血无攸利象曰上六无實承虚筐也上六與六三皆隂故士女无實豐豐亨王假之勿憂宜日中宜日中不宜過中也彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虚與時消息而况於人乎況於鬼神乎月盈則食中弦盈之極也此人鬼所以惡盈禍盈也象曰雷電皆至豐君子以折獄致刑盛明如天大之至也動於上而明於下故折獄致刑民不惑矣初九遇其配主雖旬无咎往有尚象曰雖旬无咎過旬災也所之在進光大其宜也故往而有尚非均是陽爻則蔀暗之災與六二疑疾无以異也六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也凡言往者皆進而之上也初進而上則遇陽而有尚二既以隂居隂而又所應亦隂故往无所發愈増疑疾能不私於累信然接物乃吉宜日中而所應得隂故曰見斗五在君位故以斗喻夜見之象九三豐其沛日中見沬折其右肱无咎象曰豐其沛不可大事也折其右肱終不可用也所應在隂故曰豐沛能折其右肱絶去上六而不累其明則可免咎也光大之上隂柔之終不可用也九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也无應於下近比於五故亦云見斗正應亦陽故云夷主六五来章有慶譽吉象曰六五之吉有慶也来章反比陽則明也有慶得配於四也上六豐其屋蔀其家闚其户閴其无人三嵗不覿凶象曰豐其屋天際翔也闚其户閴其无人自藏也豐屋蔀家自蔽之甚猶大明之世而夷墨其行窮大而失居者也處上之極不交於下而居動之末故曰天際翔也旅旅小亨旅貞吉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉象曰山上有火旅君子以明慎用刑而不留獄初六旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也瑣瑣不能致命遂志身窮而志卑也冗細其所為取災之道也六二旅即次懐其資得童僕貞象曰得童僕貞終无尤也居得位即次之義得三之助故曰懐其資下有一隂无所係累故曰得童僕貞九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也以陽居陽其志亢也旅而驕亢焚次宜也下比二隂喪其御下之正危厲之道九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也以陽居隂旅于處也所應在初初為瑣瑣志窮卑下不能大助於己但得其資斧之用而已志未有得故其心不快六五射雉一矢亡終以譽命象曰終以譽命上逮也四處隂應下堅介難致雉之象也以力致之徒喪其矢喪矢喪其直也文明居中必不失其直當終得譽美上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也以陽極上旅而驕肆者也失柔順之正故曰喪牛于易易肆也肆怒而忤物雖有凶危其誰告之故曰終莫之聞也巽巽小亨利有攸往利見大人彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人象曰随風巽君子以申命行事初六進退利武人之貞象曰進退志疑也利武人之貞志治也體柔居下在巽之始謙抑過中故施于武人之貞則適得其宜進退者柔不自決之象也九二巽在牀下用史巫紛若吉无咎象曰紛若之吉得中也以陽居隂其志下比无應於上故曰巽在牀下然不失中道下為之用故史巫紛若樂為之使吉而无咎非如上九喪其資斧史巫論虚華過實者言不失中道則樂盡其誠者衆矣九三頻巽吝象曰頻巽之吝志窮也三處陽剛失巽之道乗剛而動頻吝所宜志在比物故吝如復之六三志窮也六四悔亡田獲三品象曰田獲三品有功也柔順之徳以隂居位雖或乗剛悔終可亡近比於五不為諂妄而又二三并為所獲不私其累而樂為已用田獲之類也使三陽見獲四之功也九五貞吉悔亡无不利无初有終先庚三日後庚三日吉象曰九五之吉位正中也觧見蠱卦志不以正則將有悔先庚三日讓始也後庚三日存終也雖體陽居尊无應於下故不可為事之唱乃吉不著於繇辭者巽非憂患之時故也上九巽在牀下喪其資斧貞凶象曰巽在牀下上窮也喪其資斧正乎凶也柔巽過極難為之下物不為用故曰喪其資斧凶資斧尚喪餘用殫矣兊兊亨利貞彖曰兊說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉象曰麗澤兊君子以朋友講習初九和兊吉象曰和兊之吉行未疑也以陽居下无所比附出門同人行自信者也九二孚兊吉悔亡象曰孚兊之吉信志也私係於近悔也誠於接物信而不妄吉且悔亡六三来兊凶象曰来兊之凶位不當也九四商兊未寜介疾有喜象曰九四之喜有慶也通其邪佞使進而上則小人道長而不寜以諂為疾而拒外之則終不失其得偶之慶也九五孚于剥有厲象曰孚于剥位正當也說六三之進則是孚於剥近危之道也故處乎盛位者佞不可親也當正位而進小人信乎剥之道也上六引兊象曰上六引兊未光也與三為類而引升之雖不傷類然未足多也渙渙亨王假有廟利渉大川利貞萃王假有廟渙然後聚道乃久故王假有廟互見於此凡言有廟者聚道之極也彖曰渙亨剛来而不窮柔得位乎外而上同王假有廟王乃在中也利渉大川乗木有功也象曰風行水上渙先王以享于帝立廟財散則民聚王乃在渙中之一也初六用拯馬壯吉象曰初六之吉順也處險之下故必用拯无應於上順比九二之剛拯而馬壯其吉宜也九二渙奔其机悔亡象曰渙奔其机得願也奮於險中進而之前則難觧悔亡故曰奔其机三四皆險故曰得願若退累於初則險不能出其悔終存六三渙其躬无悔象曰渙其躬志在外也援上而進惟求自脫於險无悔而已非能及物者也六四渙其羣元吉渙有丘匪夷所思象曰渙其羣元吉光大也已處險外无私其應常以拯衆為心則其志光大獲吉若志在所歸之地近累於五則非能平均其慮者也九五渙汗其大號渙王居无咎象曰王居无咎正位也為渙之主使物徧被其澤正位凝命可以免咎不私於應故能均布其大號也渙然廓大以王道自居乃无咎上九渙其血去逖出无咎象曰渙其血逺害也乗剛在上若係於三害不可免能絶棄隂類逺去其難則可免咎節節亨苦節不可貞彖曰節亨剛柔分而剛得中苦節不可貞其道窮也說以行險當位以節中正以通天地節而四時成節以制度不傷財不害民象曰澤上有水節君子以制數度議徳行以苦節為貞其道之窮必矣初九不出户庭无咎象曰不出户庭知通塞也見塞於九二故不出九二不出門庭凶象曰不出門庭凶失時極也體柔位隂故不出門庭凶六三不節若則嗟若无咎象曰不節之嗟又誰咎也處非其位失節也然能居不自安則人將容之故无咎兊說也故能嗟咨取容王弼於此无咎又别立一例只舊例亦可推行但能嗟其不節有過之心則亦无咎也若武帝下罪已之詔而天下恱大人過既改則復何咎之有六四安節亨象曰安節之亨承上道也九五甘節吉往有尚象曰甘節之吉居位中也以剛居中得乎盛位優為其節者也守之不懈富貴常保故曰往有尚上六苦節貞凶悔亡象曰苦節貞凶其道窮也處險之極故曰苦節苦節而不正悔也必正而凶則道雖窮而悔亡苦節反若獲吉取悔必多中孚中孚豚魚吉利渉大川利貞彖曰中孚柔在内而剛得中說而巽孚乃化邦也豚魚吉信及豚魚也利渉大川乗木舟虚也中孚以利貞乃應乎天也象曰澤上有風中孚君子以議獄緩死中孚上巽施之下恱承之其中必有感化而出焉者盖孚者覆乳之象有必生之理信且正天之道也初九虞吉有他不燕象曰初九虞吉志未變也為信之始其信未孚而志應在四進有二三剛柔之閒非以禮自防使為衆所信取悔之道也故必防其萌使志不亂孚交如則威如乃吉九二鳴鶴在隂其子和之我有好爵吾與爾靡之象曰其子和之中心願也居中體巽无所私係徳必有鄰物願所歸位以徳致為五所任故曰與爾靡之靡偃也順從之也六三得敵或皷或罷或泣或歌象曰或皷或罷位不當也處非所安物之所惡剛而乗之柔不相比進退之際惟敵是求不恒其徳莫非已致一作惟敵是得故求之云云六四月㡬望馬匹亡无咎象曰馬匹亡絶類上也誠以接物體巽居柔隂徳之盛美者也隂徳盛美物所願交故必一其所應絶類於上使隂不疑陽如月近望而不過於盈可以无咎一作免咎九五有孚攣如无咎象曰有孚攣如位正當也處乎盛位而信不交物未免於咎也上九翰音登于天貞凶象曰翰音登于天何可長也處信之極好居物上信而无實窮上必凶一云將變而為小過也小過小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也時宜用過雖過正也失其所安者必矯其所為以求安過於自大其勢必危過於自損可以獲吉故曰上逆而下順飛鳥之象象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉過恭哀儉皆宜下之義初六飛鳥以凶象曰飛鳥以凶不可如何也六二過其祖遇其妣不及其君遇其臣无咎象曰不及其君臣不可過也與其上比於陽不若下遇於隂與其上合於五不若退附於初宜下之義也无應於上故能免咎臣居已下猶不可過況其它乎九三弗過防之從或戕之凶象曰從或戕之凶如何也居陽以剛而應于上為衆所疾非過為防慎人或戕之凶之甚也九四无咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也道非剛亢故无咎有應於下故曰弗過遇之過此以往難无以除故危而必戒不可常然故勿用永貞一云九四以陽居隂而乗九三之剛非其過也乃適與之遇耳故无咎若率是而往必危以為戒終不可久故勿用永貞當思奮爾六五宻雲不雨自我西郊公弋取彼在穴象曰宻雲不雨已上也不能畜剛止健凡言自我西郊進而不已也柔得中小事吉故曰公弋取彼在穴非及物之功且不能摧敵止暴也三止於下隐伏之象故曰在穴小過有飛鳥之象故因曰取彼在穴雨必蒸聚自下而上則其潤澤周普今日西而東趨其所應其施未光也已上亦尚往之義上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也不宜上而上乃自取之災也既濟既濟亨小利貞初吉終亂彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也象曰水在火上既濟君子以思患而豫防之通其變然後可久故止則亂也初九曳其輪濡其尾无咎象曰曳其輪義无咎也六二婦喪其茀勿逐七日得象曰七日得以中道也九三髙宗伐鬼方三年克之小人勿用象曰三年克之憊也上六險而應此處卦之未濟以終亂者也故以比鬼方九三以陽居陽文明而正故用師雖久困而必克小人用之取亡之道也六四繻有衣袽終日戒象曰終日戒有所疑也九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大来也東鄰上六也西鄰六四也過於濟厚也㡬於中時也濟而合禮雖薄受福九五既濟之主舉上與下其義之得不言而著也上六濡其首厲象曰濡其首厲何可久也未濟未濟亨小狐汔濟濡其尾无攸利彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾无攸利不續終也雖不當位剛柔應也象曰火在水上未濟君子以慎辨物居方初六濡其尾吝象曰濡其尾亦不知極也九二曳其輪貞吉象曰九二貞吉中以行正也六三未濟征凶利渉大川象曰未濟征凶位不當也有强援於上故利渉大川非義躁進凶之道也九四貞吉悔亡震用伐鬼方三年有賞于大國象曰貞吉悔亡志行也剛陽之徳迫近至尊非正而吉悔所招也初處險中叛而未一奮動討伐其勢必克堪上之任是以有賞六五貞吉无悔君子之光有孚吉象曰君子之光其暉吉也上九有孚于飲酒无咎濡其首有孚失是象曰飲酒濡首亦不知節也飲酒而至於濡首不節之甚也其必失此樂也有孚横渠易說卷二
