front:
  text: 横渠先生行狀
  hash: sha256:45f96f0a98541085b6c4ea2da0fd94da9ebf83fd6539d4918e2762f6bea79605
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0014_WYG_004-1a, image: WYG0008/WYG0008-0760a.png}
body:
  text: 吕大臨先生諱載字子厚世大梁人曽祖某生唐末歴五代不仕以子貴贈禮部侍郎祖復仕真宗朝為給事中集賢院學士贈司空父迪仕仁宗朝終於殿中丞知涪州事贈尚書都官郎中涪州卒于西官諸孤皆幼不克歸僑寓於鳳翔郿縣横渠鎮之南大振谷口因徙而家焉先生嘉祐二年登進士第始仕祁州司法恭軍遷丹州雲巖縣令又遷著作佐郎簽書渭州軍事判官公事熈寧二年冬被召入對除崇文院校書明年移疾十年春復召還館同知太常禮院是年冬謁告西歸十有二月乙亥行次臨潼卒于舘舎享年五十有八是月以其喪歸殯於家卜以元豐元年八月癸酉塟於涪州墓南之兆先生娶南陽郭氏有子曰因尚幼先生始就外傅志氣不羣知虔奉父命守不可奪涪州器之少孤自立无所不學與邠人焦寅游寅喜談兵先生説其言當康定用兵時年十八慨然以功名自許上書謁范文正公公一見知其逺器欲成就之乃責之曰儒者自有名教何事於兵因勸讀中庸先生讀其書雖愛之猶以為未足也於是又訪諸釋老之書累年盡究其説知无所得反而求之六經嘉祐初見洛陽程伯淳正叔昆弟于京師共語道學之要先生渙然自信曰吾道自足何事旁求乃盡棄異學淳如也間起從仕日益乆學益明方未第時文潞公以故相判長安聞先生名行之羙聘以束帛延之學宫異其禮際士子矜式焉其在雲巖政事大抵以敦本善俗為先每以月吉具酒食召鄉人髙年會於縣庭親為勸酬使人知養老事長之義因問民疾苦及告所以訓戒子弟之意有所告敎常患文檄之出不能盡達于民每召鄉長于庭諄諄口諭使往告其閭里間有民因事至庭或行遇于道必問某時命某告某事聞否聞即已否則罪其受命者故一言之出雖愚夫孺子無不預聞知京兆王公樂道嘗延致郡學先生多敎人以徳從容語學者曰孰能少置意科舉相從于堯舜之域否學者聞法語亦多有從之者在渭渭帥蔡公子正特所尊禮軍府之政小大咨之先生夙夜從事所以贊助之力為多竝塞之民常苦乏食而貸于官帑不能足又屬霜旱先生力言于府取軍儲數十萬以救之又言戍兵徒往来不可為用不若損數以募土人為便上嗣位之二年登用大臣思有變更御史中丞吕晦叔薦先生于朝曰張載學有本原四方之學者皆宗之可以召對訪問上即命召既入見上問治道皆以漸復三代為對上説之曰卿宜日見二府議事朕且將大用卿先生謝曰臣自外官赴召未測朝廷新政所安願徐觀旬月繼有所獻上然之他日見執政執政嘗語曰新政之更懼不能任事求助于子何如先生對曰朝廷將大有為天下之士願與下風若與人為善則孰敢不盡如敎玉人追琢則人亦故有不能執政黙然所語多不合寖不悦既命校書崇文先生辭未得謝復命案獄浙東或有為之言曰張載以道徳進不宜使之治獄執政曰淑問如臯陶猶且獻囚此庸何傷獄成還朝會弟天祺以言得罪先生益不安乃謁告西歸居于横渠故居遂移疾不起横渠至僻陋有田數百畝以供嵗計約而不足人不堪其憂而先生處之益安終日危坐一室左右簡編俯而讀仰而思有得則識之或中夜起坐取燭以書其志道精思未始須臾息亦未嘗須臾忘也學者有問多告以知禮成性變化氣質之道學必如聖人而後已聞者莫不動心有進又以為敎之必能養之然後信故雖貧不能自給苟信反躬自治不以語人雖有未論安行而无悔故識與不識聞風而畏非其義也不敢以一毫及之其家童子必使洒掃應對給侍長者女子之未嫁者必使親祭祀納酒漿皆所以養孫弟就成徳嘗曰事親奉祭豈可使人為之聞人之善喜見顔色答問學者雖多不倦有不能者未嘗不開其端其所至必訪人才有可語者必丁寧以誨之惟恐其成就之晚嵗適大歉至人相食家人惡米不鑿將舂之先生亟止之曰饑殍盈野雖疏食且自愧又安忍有擇乎甚或咨嗟門人之無貲者雖糲疏亦共之其自得之者窮神化一天人立大本斥異學自孟子以来未之有也嘗謂門人曰吾學既得于心則修其辭命辭無差然後斷事斷事無失吾乃沛然精義入神者豫而已矣近世喪祭無法喪惟致隆三年自期以下未始有衰麻之變祭先之禮一用流俗節序燕褻不嚴先生繼遭期功之喪始治喪服輕重如禮家祭始行四時之薦曲盡誠潔聞者始或疑笑終乃信而從之一變從古者甚衆皆先生倡之先生氣質剛毅徳盛貌嚴然與人居乆而日親其治家接物大要正己以感人人未之對案不食者數四熈寧九年秋先生感異夢忽以書屬門人乃集所立言謂之正䝉出示門人曰此書予厯年致思之所得其言殆於前聖合與大要發端示人而已其觸類廣之則吾將有待于學者正如老木之株枝别固多所少者潤澤華葉爾又嘗謂春秋之為書在古無有乃聖人所自作唯孟子為能知之非理明義精殆未可學先儒未及此而治之故其説多穿鑿及詩書禮樂之言多不能平易其心以意逆志方且條舉大例考察文理與學者緒正其說先生慨然有意三代之治望道而欲見論治人先務未始不以經界為急講求法制粲然備具要之可以行于今如有用我者舉而措之爾嘗曰仁政必自經界始貧富不均敎養無法雖欲言治皆苟而已世之病難行者未始不以亟奪富人之田為辭然兹法之行悦之者衆苟處之有術期以數年不刑一人而可復所病者特上未之行爾乃言曰縱不得行之天下猶可驗之一鄉方與學者議古之法共買田一方畫為數井上不失公家之賦役退以其私正經界分宅里立斂法廣儲蓄興學校成禮俗救災恤患敦本抑末足以推先王之遺法明當今之可行此皆有志未就會秦鳳帥吕公薦之曰張載之學善發聖人之遺意其術畧可措之以復古乞召還舊職訪以治體詔從之先生曰吾是行也不敢以疾辭庶㡬有遇焉及至都公卿聞風慕之然未有深知先生者以所欲言嘗試于人多不之信會有言者欲講行冠婚喪祭之禮詔下禮官禮官安習故常以古今異俗為説先生獨以為可行且謂稱不可非儒生博士所宜衆莫能奪然議卒不決郊廟之禮禮官預焉先生見禮不致嚴亟欲正之而衆莫之助先生益不悦會有疾謁告以歸知道之難行欲與門人成其初志不幸告終不卒其願沒之日唯一甥在側囊中索然明日門人之在長安者繼来奔哭之賻襚始克斂遂奉柩歸殯以塟又卜以三月而塟其治喪禮一用古以終先生之志某惟先生之學之至備存于書畧述于謚議矣然欲求文以表其墓必得行事之迹敢次以書
  hash: sha256:8bf4ac205cad8f621d58f05f6c952f7166b215389c661f17e3e6153e8514d922
